name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test and Package Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Ensure executable permissions
        run: chmod +x bin/*.js scripts/*.sh

      - name: Lint JavaScript
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: ShellCheck
        run: shellcheck --severity=warning scripts/*.sh

      - name: Run shell tests (Bats)
        run: |
          sudo npm install -g bats 2>/dev/null || \
            (git clone --depth 1 https://github.com/bats-core/bats-core.git /tmp/bats-core && sudo /tmp/bats-core/install.sh /usr/local)
          bats tests/shell/

      - name: Run test suite
        run: npm test

      - name: Validate npm package contents
        run: npm run pack:dry-run

      - name: Smoke test from packed tarball
        run: |
          TARBALL="$(npm pack | tail -n 1)"
          npx --yes "./${TARBALL}" --help
          rm -f "${TARBALL}"

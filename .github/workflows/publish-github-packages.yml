name: Publish to GitHub Packages

on:
  workflow_dispatch:
    inputs:
      package_version:
        description: 'Package version to publish, for example 0.1.0-beta.3. Leave empty to use package.json.'
        required: false
        default: ''
        type: string
      dist_tag:
        description: 'GitHub Packages dist-tag'
        required: true
        default: 'beta'
        type: choice
        options:
          - beta
          - latest
      dry_run:
        description: 'Run publish in dry-run mode'
        required: true
        default: true
        type: boolean
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish scoped package to npm.pkg.github.com
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply package version override
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.package_version != ''
        env:
          PACKAGE_VERSION: ${{ github.event.inputs.package_version }}
        run: |
          if ! [[ "$PACKAGE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid package_version: $PACKAGE_VERSION" >&2
            exit 2
          fi

          CURRENT_VERSION="$(node -p "require('./package.json').version")"
          if [[ "$CURRENT_VERSION" == "$PACKAGE_VERSION" ]]; then
            echo "package.json is already at $PACKAGE_VERSION; skipping npm version."
            exit 0
          fi

          npm version "$PACKAGE_VERSION" --no-git-tag-version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Ensure executable permissions
        run: chmod +x bin/*.js scripts/*.sh

      - name: Run test suite
        run: npm test

      - name: Validate npm package contents
        run: npm run pack:dry-run

      - name: Resolve package metadata
        id: package_metadata
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          OWNER_LC="$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')"
          echo "name=@${OWNER_LC}/create-spec-driven-app" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Set publish settings
        id: publish_settings
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            echo "dist_tag=latest" >> "$GITHUB_OUTPUT"
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "dist_tag=${{ github.event.inputs.dist_tag }}" >> "$GITHUB_OUTPUT"
            echo "dry_run=${{ github.event.inputs.dry_run }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check package version availability
        if: steps.publish_settings.outputs.dry_run != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PACKAGE="${{ steps.package_metadata.outputs.name }}"
          VERSION="${{ steps.package_metadata.outputs.version }}"

          if npm view "${PACKAGE}@${VERSION}" version --registry https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "${PACKAGE}@${VERSION} already exists on GitHub Packages. Choose a new package_version." >&2
            exit 1
          fi

      - name: Publish summary
        run: |
          echo "Package: ${{ steps.package_metadata.outputs.name }}"
          echo "Version: ${{ steps.package_metadata.outputs.version }}"
          echo "Dist tag: ${{ steps.publish_settings.outputs.dist_tag }}"
          echo "Dry run: ${{ steps.publish_settings.outputs.dry_run }}"

      - name: Prepare scoped package copy
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          OWNER_LC="$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')"
          PKG_DIR="/tmp/ghpkg"
          rm -rf "$PKG_DIR"
          mkdir -p "$PKG_DIR"
          cp -R . "$PKG_DIR"
          cd "$PKG_DIR"
          npm pkg set name="@${OWNER_LC}/create-spec-driven-app"

      - name: Publish to GitHub Packages (dry run)
        if: steps.publish_settings.outputs.dry_run == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: false
        run: |
          cd /tmp/ghpkg
          npm publish \
            --registry https://npm.pkg.github.com \
            --tag "${{ steps.publish_settings.outputs.dist_tag }}" \
            --access public \
            --dry-run

      - name: Publish to GitHub Packages
        if: steps.publish_settings.outputs.dry_run != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: false
        run: |
          cd /tmp/ghpkg
          npm publish \
            --registry https://npm.pkg.github.com \
            --tag "${{ steps.publish_settings.outputs.dist_tag }}" \
            --access public

name: Publish to GitHub Packages

on:
  workflow_dispatch:
    inputs:
      dist_tag:
        description: 'GitHub Packages dist-tag'
        required: true
        default: 'beta'
        type: choice
        options:
          - beta
          - latest
      dry_run:
        description: 'Run publish in dry-run mode'
        required: true
        default: true
        type: boolean
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish scoped package to npm.pkg.github.com
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Ensure executable permissions
        run: chmod +x bin/*.js scripts/*.sh

      - name: Run test suite
        run: npm test

      - name: Validate npm package contents
        run: npm run pack:dry-run

      - name: Set publish settings
        id: publish_settings
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            echo "dist_tag=latest" >> "$GITHUB_OUTPUT"
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "dist_tag=${{ github.event.inputs.dist_tag }}" >> "$GITHUB_OUTPUT"
            echo "dry_run=${{ github.event.inputs.dry_run }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare scoped package copy
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          OWNER_LC="$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')"
          PKG_DIR="/tmp/ghpkg"
          rm -rf "$PKG_DIR"
          mkdir -p "$PKG_DIR"
          cp -R . "$PKG_DIR"
          cd "$PKG_DIR"
          npm pkg set name="@${OWNER_LC}/create-spec-driven-app"

      - name: Publish to GitHub Packages (dry run)
        if: steps.publish_settings.outputs.dry_run == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd /tmp/ghpkg
          npm publish \
            --registry https://npm.pkg.github.com \
            --tag "${{ steps.publish_settings.outputs.dist_tag }}" \
            --access public \
            --dry-run

      - name: Publish to GitHub Packages
        if: steps.publish_settings.outputs.dry_run != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd /tmp/ghpkg
          npm publish \
            --registry https://npm.pkg.github.com \
            --tag "${{ steps.publish_settings.outputs.dist_tag }}" \
            --access public

name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      dist_tag:
        description: 'npm dist-tag to publish under'
        required: true
        default: 'beta'
        type: choice
        options:
          - beta
          - latest
      dry_run:
        description: 'Run npm publish in dry-run mode'
        required: true
        default: true
        type: boolean
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish package
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Ensure executable permissions
        run: chmod +x bin/*.js scripts/*.sh

      - name: Run test suite
        run: npm test

      - name: Validate npm package contents
        run: npm run pack:dry-run

      - name: Set publish settings
        id: publish_settings
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            echo "dist_tag=latest" >> "$GITHUB_OUTPUT"
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "dist_tag=${{ github.event.inputs.dist_tag }}" >> "$GITHUB_OUTPUT"
            echo "dry_run=${{ github.event.inputs.dry_run }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish (dry run)
        if: steps.publish_settings.outputs.dry_run == 'true'
        run: npm publish --tag "${{ steps.publish_settings.outputs.dist_tag }}" --access public --provenance --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish
        if: steps.publish_settings.outputs.dry_run != 'true'
        run: npm publish --tag "${{ steps.publish_settings.outputs.dist_tag }}" --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
